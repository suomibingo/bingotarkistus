<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Tarkistus</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #f0c040;
    --accent2: #e05a2b;
    --green: #2ecc71;
    --red: #e74c3c;
    --blue: #3498db;
    --text: #e8eaf0;
    --text-dim: #7a8499;
    --border: #2a3449;
    --hit: #f0c040;
    --miss: #1e2d3d;
    --star: #f0c040;
    --bingo-line: #e74c3c;
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
  }

  .app {
    max-width: 820px;
    margin: 0 auto;
    padding: 20px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    width: 48px;
    height: 48px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--bg);
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 3px;
  }

  h1 span { color: var(--accent); }

  .mode-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .mode-tab {
    flex: 1;
    padding: 12px 10px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    text-transform: uppercase;
    cursor: pointer;
  }

  .mode-tab.active {
    border-color: var(--accent);
    background: rgba(240,192,64,0.1);
    color: var(--accent);
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    display: none;
  }

  .section.visible { display: block; }

  .scanner-area {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  video { width: 100%; height: 100%; object-fit: cover; }

  .scanner-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .scan-frame {
    width: 200px;
    height: 200px;
    border: 2px solid rgba(240,192,64,0.3);
    position: relative;
  }

  .scan-frame.found {
    border-color: var(--green);
    background: rgba(46, 204, 113, 0.2);
  }

  .scan-line {
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: var(--accent);
    animation: scan 2s linear infinite;
  }

  @keyframes scan {
    0% { top: 0; }
    100% { top: 100%; }
  }

  .btn {
    padding: 12px 24px;
    border-radius: var(--radius);
    border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 10px;
  }

  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

  .chip {
    display: inline-flex;
    padding: 5px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin: 2px;
    color: var(--accent);
  }

  .verdict {
    text-align: center;
    padding: 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    border-radius: 10px;
    margin-bottom: 20px;
  }
  .win { background: rgba(46,204,113,0.2); color: var(--green); border: 2px solid var(--green); }
  .loss { background: rgba(231,76,60,0.2); color: var(--red); border: 2px solid var(--red); }

  .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
  .grid-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: var(--miss); border: 1px solid var(--border); border-radius: 4px; font-weight: 700; }
  .grid-cell.hit { background: rgba(240,192,64,0.3); color: var(--accent); border-color: var(--accent); }
  .grid-cell.star { color: var(--accent); font-size: 1.5rem; }

  .row-wrapper { position: relative; margin-bottom: 5px; }
  .row-line { position: absolute; top: 50%; left: 0; right: 0; height: 4px; background: var(--red); z-index: 5; border-radius: 2px; pointer-events: none; }

  .hidden { display: none !important; }

  .steps-nav { display: flex; gap: 5px; margin-bottom: 20px; }
  .step-dot { flex: 1; height: 5px; background: var(--border); border-radius: 2px; }
  .step-dot.active { background: var(--accent); }
  .step-dot.done { background: var(--green); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">B!</div>
    <div><h1>BINGO <span>TARKISTUS</span></h1></div>
  </header>

  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-pieni" onclick="setMode('pieni')">🎯 Pieni</button>
    <button class="mode-tab" id="tab-iso" onclick="setMode('iso')">🚢 Iso</button>
    <button class="mode-tab" id="tab-arvonta" onclick="setMode('arvonta')">🎲 Arvonta</button>
  </div>

  <div id="bingo-flow">
    <div class="steps-nav">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
      <div class="step-dot" id="dot3"></div>
      <div class="step-dot" id="dot4"></div>
    </div>

    <div class="section visible" id="step1">
      <h3>1. Asetukset</h3>
      <p>Kuinka monta riviä haetaan?</p>
      <div class="btn-row" id="target-btns" style="margin: 15px 0;">
        <button class="btn btn-secondary active" onclick="setTarget(1)">1</button>
        <button class="btn btn-secondary" onclick="setTarget(2)">2</button>
        <button class="btn btn-secondary" onclick="setTarget(3)">3</button>
        <button class="btn btn-secondary" onclick="setTarget(4)">4</button>
        <button class="btn btn-secondary" onclick="setTarget(5)">5</button>
      </div>
      <button class="btn btn-primary" onclick="goStep(2)">Seuraava →</button>
    </div>

    <div class="section" id="step2">
      <h3>2. Skannaa TV</h3>
      <div class="scanner-area">
        <video id="video2" playsinline></video>
        <div class="scanner-overlay"><div class="scan-frame" id="frame2"><div class="scan-line"></div></div></div>
      </div>
      <p id="status2">Odottaa kameraa...</p>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="startScan(2)">📷 Avaa kamera</button>
        <button class="btn btn-secondary" onclick="stopScan(2)">⏹ Sulje</button>
      </div>
      <div id="tv-numbers-preview" class="hidden">
        <p>Huudetut: <span id="count2">0</span> kpl</p>
        <div id="chips2"></div>
      </div>
      <button class="btn btn-secondary" onclick="goStep(1)" style="margin-top:20px">← Takaisin</button>
    </div>

    <div class="section" id="step3">
      <h3>3. Skannaa Lappu</h3>
      <div class="scanner-area">
        <video id="video3" playsinline></video>
        <div class="scanner-overlay"><div class="scan-frame" id="frame3"><div class="scan-line"></div></div></div>
      </div>
      <p id="status3">Odottaa kameraa...</p>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="startScan(3)">📷 Avaa kamera</button>
        <button class="btn btn-secondary" onclick="stopScan(3)">⏹ Sulje</button>
      </div>
      <button class="btn btn-secondary" onclick="goStep(2)" style="margin-top:20px">← Takaisin</button>
    </div>

    <div class="section" id="step4">
      <div id="results-container"></div>
      <button class="btn btn-primary" onclick="goStep(3)">Skannaa uusi lappu</button>
      <button class="btn btn-secondary" onclick="location.reload()">🔄 Aloita alusta</button>
    </div>
  </div>

  <div id="arvonta-flow" class="hidden">
    <div class="section visible">
      <h3>🎲 Lisäarvonta</h3>
      <div class="scanner-area">
        <video id="video-arvonta" playsinline></video>
        <div class="scanner-overlay"><div class="scan-frame" id="frame-arvonta"><div class="scan-line"></div></div></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="startScan('arvonta')">📷 Skannaa koodi</button>
      </div>
      <div id="participants" style="margin-top:15px">Osallistujia: 0</div>
      <button class="btn btn-primary" onclick="runRaffle()" style="width:100%">🎯 SUORITA ARVONTA</button>
      <div id="winner-display"></div>
    </div>
  </div>
</div>

<script>
let state = {
  mode: 'pieni',
  target: 1,
  called: new Set(),
  grids: [],
  participants: new Set(),
  scanning: false
};

const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

function setMode(m) {
  state.mode = m;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.toggle('active', b.id === 'tab-'+m));
  document.getElementById('bingo-flow').classList.toggle('hidden', m === 'arvonta');
  document.getElementById('arvonta-flow').classList.toggle('hidden', m !== 'arvonta');
  goStep(1);
}

function setTarget(n) {
  state.target = n;
  document.querySelectorAll('#target-btns .btn').forEach((b, i) => b.classList.toggle('active', i === n-1));
}

function goStep(n) {
  stopAllScans();
  [1,2,3,4].forEach(i => {
    document.getElementById('step'+i).classList.toggle('visible', i === n);
    const dot = document.getElementById('dot'+i);
    dot.className = 'step-dot' + (i<n ? ' done' : (i===n ? ' active' : ''));
  });
}

// --- SCANNER ENGINE ---
async function startScan(id) {
  stopAllScans();
  state.scanning = true;
  const video = document.getElementById(id === 'arvonta' ? 'video-arvonta' : 'video'+id);
  const status = document.getElementById(id === 'arvonta' ? 'status-arvonta' : 'status'+id);

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: 'environment', width: 1280 } 
    });
    video.srcObject = stream;
    video.play();
    requestAnimationFrame(() => scanLoop(id, video));
  } catch (err) {
    if(status) status.textContent = "Kamera-apu: Salli käyttö selaimessa.";
  }
}

function stopAllScans() {
  state.scanning = false;
  document.querySelectorAll('video').forEach(v => {
    if(v.srcObject) {
      v.srcObject.getTracks().forEach(t => t.stop());
      v.srcObject = null;
    }
  });
}

function stopScan(id) { stopAllScans(); }

function scanLoop(id, video) {
  if (!state.scanning) return;

  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imgData.data, imgData.width, imgData.height);

    if (code) {
      const frame = document.getElementById(id === 'arvonta' ? 'frame-arvonta' : 'frame'+id);
      frame.classList.add('found');
      setTimeout(() => {
        onCodeFound(id, code.data);
        frame.classList.remove('found');
      }, 300);
      return;
    }
  }
  requestAnimationFrame(() => scanLoop(id, video));
}

function onCodeFound(id, data) {
  if (id === 2) {
    const nums = data.match(/\d+/g);
    if(nums) {
      nums.forEach(n => state.called.add(parseInt(n)));
      updateTVPreview();
      goStep(3); // Automaattinen siirtyminen
      startScan(3); // Avaa heti lapun skannaus
    }
  } else if (id === 3) {
    processTicket(data);
  } else if (id === 'arvonta') {
    const code = data.match(/\d{4,10}/);
    if(code) {
      state.participants.add(code[0]);
      document.getElementById('participants').textContent = "Osallistujia: " + state.participants.size;
    }
  }
}

function updateTVPreview() {
  const sorted = [...state.called].sort((a,b) => a-b);
  document.getElementById('count2').textContent = sorted.length;
  document.getElementById('chips2').innerHTML = sorted.map(n => `<span class="chip">${n}</span>`).join('');
  document.getElementById('tv-numbers-preview').classList.remove('hidden');
}

function processTicket(text) {
  const grids = [];
  const parts = text.split(/\||\n\n/);
  
  parts.forEach(p => {
    const grid = [];
    const regex = /([BINGO]):([^\s]+)/gi;
    let m;
    while ((m = regex.exec(p)) !== null) {
      const nums = m[2].split(',').map(v => 
        v.toUpperCase() === 'T' ? {v:'★', s:true} : {v:parseInt(v), s:false}
      );
      grid.push({label: m[1].toUpperCase(), nums});
    }
    if(grid.length === 5) grids.push(grid);
  });

  if(grids.length > 0) {
    state.grids = state.mode === 'iso' ? (grids.length === 1 ? [grids[0], grids[0], grids[0]] : grids.slice(0,3)) : [grids[0]];
    showResults();
  }
}

function showResults() {
  stopAllScans();
  goStep(4);
  let html = '';
  let gridWins = [];

  state.grids.forEach((grid, gi) => {
    const rowResults = [0,1,2,3,4].map(r => grid.every(col => col.nums[r].s || state.called.has(col.nums[r].v)));
    gridWins.push(rowResults.filter(Boolean).length);

    html += `<div style="color:var(--accent); margin: 15px 0 5px; font-weight:700; letter-spacing:2px; text-align:center">${state.mode==='iso'?['YLÄRUUDUKKO','KESKIRUUDUKKO','ALARUUDUKKO'][gi]:''}</div>`;
    html += `<div class="bingo-grid" style="grid-template-columns:repeat(5, 1fr); background:none; font-family:'Bebas Neue'">` + 
            ['B','I','N','G','O'].map(l => `<div style="text-align:center; color:var(--accent)">${l}</div>`).join('') + `</div>`;

    for(let r=0; r<5; r++) {
      html += `<div class="row-wrapper"><div class="bingo-grid">`;
      grid.forEach(col => {
        const cell = col.nums[r];
        const isHit = cell.s || state.called.has(cell.v);
        html += `<div class="grid-cell ${isHit?'hit':''} ${cell.s?'star':''}">${cell.v}</div>`;
      });
      html += `</div>${rowResults[r] ? '<div class="row-line"></div>' : ''}</div>`;
    }
  });

  const win = state.mode === 'pieni' ? gridWins[0] >= state.target : gridWins.some(w => w >= state.target);
  const verdict = `<div class="verdict ${win?'win':'loss'}">${win?'BINGO ON AITO! 🎉':'EI VIELÄ BINGOA'}</div>`;
  document.getElementById('results-container').innerHTML = verdict + html;
}

function runRaffle() {
  const codes = [...state.participants];
  if(codes.length === 0) return alert("Ei osallistujia!");
  const display = document.getElementById('winner-display');
  let count = 0;
  const itv = setInterval(() => {
    display.innerHTML = `<div class="verdict win" style="font-size:2rem">ARVOTAAN...<br>${codes[Math.floor(Math.random()*codes.length)]}</div>`;
    if(++count > 30) {
      clearInterval(itv);
      display.innerHTML = `<div class="verdict win">🏆 VOITTAJA:<br>${codes[Math.floor(Math.random()*codes.length)]}</div>`;
    }
  }, 100);
}
</script>
</body>
</html>
