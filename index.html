<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Tarkistus Pro</title>
<!-- Vaihdettu vakaampaan ja tehokkaampaan kirjastoon -->
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #f0c040;
    --green: #2ecc71;
    --red: #e74c3c;
    --text: #e8eaf0;
    --text-dim: #7a8499;
    --border: #2a3449;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

  .app { max-width: 800px; margin: 0 auto; padding: 20px 16px; }

  header {
    display: flex; align-items: center; gap: 14px; margin-bottom: 25px;
    padding-bottom: 15px; border-bottom: 1px solid var(--border);
  }
  .logo { width: 45px; height: 45px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue'; font-size: 20px; color: var(--bg); }
  h1 { font-family: 'Bebas Neue'; font-size: 2rem; letter-spacing: 2px; }
  h1 span { color: var(--accent); }

  /* MODE SELECTOR */
  .mode-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .mode-tab { flex: 1; padding: 12px; border: 2px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text-dim); font-family: 'Barlow Condensed'; font-weight: 700; text-transform: uppercase; cursor: pointer; }
  .mode-tab.active { border-color: var(--accent); background: rgba(240,192,64,0.1); color: var(--accent); }

  /* PROGRESS BAR */
  .steps-nav { display: flex; gap: 6px; margin-bottom: 20px; }
  .step-dot { flex: 1; height: 5px; background: var(--border); border-radius: 10px; }
  .step-dot.active { background: var(--accent); }
  .step-dot.done { background: var(--green); }

  /* SECTIONS */
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: none; }
  .section.visible { display: block; }

  /* SCANNER - TÄRKEÄ KORJAUS */
  #reader {
    width: 100%; border-radius: var(--radius) !important; overflow: hidden;
    border: none !important; background: #000;
  }
  /* Piilotetaan kirjaston turhia tekstejä */
  #reader__dashboard_section_csr button {
    background: var(--accent) !important; color: var(--bg) !important;
    font-family: 'Barlow Condensed' !important; border-radius: 6px !important;
    padding: 8px 16px !important; border: none !important; font-weight: 700 !important;
  }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 20px; border-radius: var(--radius); border: none;
    font-family: 'Barlow Condensed'; font-size: 1rem; font-weight: 700;
    text-transform: uppercase; cursor: pointer; width: 100%; margin-top: 15px;
  }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  
  .pill-group { display: flex; gap: 8px; margin: 15px 0; justify-content: center; }
  .pill { padding: 8px 18px; border: 1.5px solid var(--border); border-radius: 20px; background: none; color: var(--text-dim); cursor: pointer; font-family: 'Barlow Condensed'; font-weight: 700; }
  .pill.active { border-color: var(--accent); color: var(--accent); background: rgba(240,192,64,0.1); }

  .chip { display: inline-flex; padding: 4px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; margin: 2px; color: var(--accent); font-weight: 600; }

  /* RESULTS */
  .verdict { text-align: center; padding: 15px; font-family: 'Bebas Neue'; font-size: 2.2rem; border-radius: 10px; margin-bottom: 15px; }
  .win { background: rgba(46,204,113,0.15); color: var(--green); border: 2px solid var(--green); }
  .loss { background: rgba(231,76,60,0.15); color: var(--red); border: 2px solid var(--red); }

  .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 5px; }
  .grid-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #1e2d3d; border: 1px solid var(--border); border-radius: 6px; font-weight: 700; font-size: 1.1rem; position: relative; }
  .grid-cell.hit { background: rgba(240,192,64,0.25); color: var(--accent); border-color: var(--accent); }
  .grid-cell.hit::after { content:''; position: absolute; inset: 4px; border: 2px solid var(--accent); border-radius: 50%; opacity: 0.5; }
  .grid-cell.star { color: var(--accent); font-size: 1.4rem; }

  .row-line { position: absolute; top: 50%; left: 0; right: 0; height: 4px; background: var(--red); z-index: 5; border-radius: 10px; pointer-events: none; }
  .hidden { display: none !important; }

  @media (max-width: 480px) {
    h1 { font-size: 1.5rem; }
    .grid-cell { font-size: 0.9rem; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">B!</div>
    <h1>BINGO <span>TARKISTUS</span></h1>
  </header>

  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-pieni" onclick="setMode('pieni')">🎯 Pieni</button>
    <button class="mode-tab" id="tab-iso" onclick="setMode('iso')">🚢 Iso</button>
    <button class="mode-tab" id="tab-arvonta" onclick="setMode('arvonta')">🎲 Arvonta</button>
  </div>

  <div id="bingo-flow">
    <div class="steps-nav">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
      <div class="step-dot" id="dot3"></div>
      <div class="step-dot" id="dot4"></div>
    </div>

    <!-- STEP 1 -->
    <div class="section visible" id="step1">
      <div style="font-family:'Barlow Condensed'; letter-spacing:1px; text-transform:uppercase; color:var(--text-dim)">Vaihe 1: Asetukset</div>
      <p style="margin-top:5px">Kuinka monta riviä haetaan?</p>
      <div class="pill-group" id="target-pills">
        <button class="pill active" onclick="setTarget(1)">1</button>
        <button class="pill" onclick="setTarget(2)">2</button>
        <button class="pill" onclick="setTarget(3)">3</button>
        <button class="pill" onclick="setTarget(4)">4</button>
        <button class="pill" onclick="setTarget(5)">5</button>
      </div>
      <button class="btn btn-primary" onclick="goStep(2)">Seuraava → Skannaa TV</button>
    </div>

    <!-- STEP 2 & 3 - YHTEINEN SKANNERI -->
    <div class="section" id="step-scan">
      <div style="font-family:'Barlow Condensed'; letter-spacing:1px; text-transform:uppercase; color:var(--text-dim)" id="scan-title">Skannaa TV</div>
      <div id="reader" style="margin-top:15px"></div>
      <div id="scan-status" style="margin-top:10px; text-align:center; font-size:0.9rem; color:var(--accent)">Etsitään koodia...</div>
      
      <div id="tv-preview" class="hidden" style="margin-top:15px; padding:10px; background:var(--surface2); border-radius:8px">
        <div style="font-size:0.8rem; text-transform:uppercase; color:var(--text-dim)">Tallennettu <span id="tv-count">0</span> numeroa</div>
        <div id="tv-chips" style="margin-top:5px"></div>
      </div>

      <button class="btn btn-secondary" onclick="goHome()">Lopeta ja nollaa</button>
    </div>

    <!-- STEP 4 -->
    <div class="section" id="step4">
      <div id="results-container"></div>
      <button class="btn btn-primary" onclick="restartScan()">Skannaa uusi lappu</button>
      <button class="btn btn-secondary" onclick="goHome()">Palaa alkuun</button>
    </div>
  </div>

  <!-- ARVONTA -->
  <div id="arvonta-flow" class="hidden">
    <div class="section visible">
      <div style="font-family:'Barlow Condensed'; letter-spacing:1px; text-transform:uppercase; color:var(--text-dim)">🎲 Lisäarvonta</div>
      <div id="raffle-reader" style="margin-top:15px"></div>
      <div style="margin-top:15px">
        <p>Osallistujia: <span id="raffle-count" style="color:var(--accent); font-weight:700">0</span></p>
        <div id="raffle-winner"></div>
        <button class="btn btn-primary" onclick="runRaffle()">🎯 SUORITA ARVONTA</button>
        <button class="btn btn-secondary" onclick="clearRaffle()">Tyhjennä lista</button>
      </div>
    </div>
  </div>
</div>

<script>
let state = {
  mode: 'pieni',
  target: 1,
  called: new Set(),
  grids: [],
  participants: new Set(),
  step: 1
};

let html5QrScanner = null;

function setMode(m) {
  state.mode = m;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.toggle('active', b.id === 'tab-'+m));
  document.getElementById('bingo-flow').classList.toggle('hidden', m === 'arvonta');
  document.getElementById('arvonta-flow').classList.toggle('hidden', m !== 'arvonta');
  if(m === 'arvonta') startRaffleScanner();
  else { if(html5QrScanner) html5QrScanner.clear(); goStep(1); }
}

function setTarget(n) {
  state.target = n;
  document.querySelectorAll('#target-pills .pill').forEach((p, i) => p.classList.toggle('active', i === n-1));
}

function goStep(n) {
  state.step = n;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  
  if (n === 1) {
    document.getElementById('step1').classList.add('visible');
  } else if (n === 2 || n === 3) {
    document.getElementById('step-scan').classList.add('visible');
    document.getElementById('scan-title').textContent = n === 2 ? "VAIHE 2: SKANNAA TV" : "VAIHE 3: SKANNAA LAPPU";
    startMainScanner();
  } else if (n === 4) {
    document.getElementById('step4').classList.add('visible');
  }

  [1,2,3,4].forEach(i => {
    const dot = document.getElementById('dot'+i);
    dot.className = 'step-dot' + (i<n ? ' done' : (i===n ? ' active' : ''));
  });
}

function goHome() {
  state.called.clear();
  state.grids = [];
  if(html5QrScanner) html5QrScanner.clear();
  goStep(1);
}

function startMainScanner() {
  if(html5QrScanner) html5QrScanner.clear();
  html5QrScanner = new Html5Qrcode("reader");
  const config = { fps: 15, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };

  html5QrScanner.start({ facingMode: "environment" }, config, (text) => {
    if (state.step === 2) {
      const nums = text.match(/\d+/g);
      if(nums) {
        nums.forEach(n => state.called.add(parseInt(n)));
        updateTVPreview();
        goStep(3); // Siirrytään automaattisesti lappuun
      }
    } else if (state.step === 3) {
      processTicket(text);
    }
  });
}

function updateTVPreview() {
  const sorted = [...state.called].sort((a,b) => a-b);
  document.getElementById('tv-count').textContent = sorted.length;
  document.getElementById('tv-chips').innerHTML = sorted.map(n => `<span class="chip">${n}</span>`).join('');
  document.getElementById('tv-preview').classList.remove('hidden');
}

function processTicket(text) {
  const grids = [];
  const parts = text.split(/\||\n\n/);
  
  parts.forEach(p => {
    const grid = [];
    const regex = /([BINGO]):([^\s]+)/gi;
    let m;
    while ((m = regex.exec(p)) !== null) {
      const nums = m[2].split(',').map(v => 
        v.toUpperCase() === 'T' ? {v:'★', s:true} : {v:parseInt(v), s:false}
      );
      grid.push({label: m[1].toUpperCase(), nums});
    }
    if(grid.length === 5) grids.push(grid);
  });

  if(grids.length > 0) {
    if(html5QrScanner) html5QrScanner.stop();
    state.grids = state.mode === 'iso' ? (grids.length === 1 ? [grids[0], grids[0], grids[0]] : grids.slice(0,3)) : [grids[0]];
    showResults();
  }
}

function showResults() {
  goStep(4);
  let html = '';
  let gridWins = [];

  state.grids.forEach((grid, gi) => {
    const rowResults = [0,1,2,3,4].map(r => grid.every(col => col.nums[r].s || state.called.has(col.nums[r].v)));
    gridWins.push(rowResults.filter(Boolean).length);

    html += `<div style="color:var(--accent); margin: 20px 0 5px; font-weight:700; letter-spacing:1px; text-align:center">${state.mode==='iso'?['YLÄRUUDUKKO','KESKIRUUDUKKO','ALARUUDUKKO'][gi]:''}</div>`;
    html += `<div class="bingo-grid" style="background:none; border:none; height:auto; margin-bottom:10px">` + 
            ['B','I','N','G','O'].map(l => `<div style="text-align:center; color:var(--accent); font-family:'Bebas Neue'; font-size:1.2rem">${l}</div>`).join('') + `</div>`;

    for(let r=0; r<5; r++) {
      html += `<div style="position:relative; margin-bottom:6px"><div class="bingo-grid">`;
      grid.forEach(col => {
        const cell = col.nums[r];
        const isHit = cell.s || state.called.has(cell.val || cell.v);
        html += `<div class="grid-cell ${isHit?'hit':''} ${cell.s?'star':''}">${cell.v}</div>`;
      });
      html += `</div>${rowResults[r] ? '<div class="row-line"></div>' : ''}</div>`;
    }
  });

  const win = state.mode === 'pieni' ? gridWins[0] >= state.target : gridWins.some(w => w >= state.target);
  const verdict = `<div class="verdict ${win?'win':'loss'}">${win?'BINGO ON AITO! 🎉':'EI VIELÄ BINGOA'}</div>`;
  document.getElementById('results-container').innerHTML = verdict + html;
}

function restartScan() {
  goStep(3);
}

// --- ARVONTA ---
function startRaffleScanner() {
  if(html5QrScanner) html5QrScanner.clear();
  html5QrScanner = new Html5Qrcode("raffle-reader");
  html5QrScanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
    const code = text.match(/\d{4,10}/);
    if(code && !state.participants.has(code[0])) {
      state.participants.add(code[0]);
      document.getElementById('raffle-count').textContent = state.participants.size;
      // Visuaalinen palaute skannauksesta
      document.body.style.backgroundColor = "#1a2a1a";
      setTimeout(() => document.body.style.backgroundColor = var(--bg), 200);
    }
  });
}

function runRaffle() {
  const codes = [...state.participants];
  if(codes.length === 0) return alert("Ei osallistujia!");
  const display = document.getElementById('raffle-winner');
  let count = 0;
  const itv = setInterval(() => {
    display.innerHTML = `<div class="verdict win" style="font-size:1.8rem">ARVOTAAN...<br>${codes[Math.floor(Math.random()*codes.length)]}</div>`;
    if(++count > 25) {
      clearInterval(itv);
      display.innerHTML = `<div class="verdict win" style="border-style:dashed">🏆 VOITTAJA:<br><span style="font-size:3rem">${codes[Math.floor(Math.random()*codes.length)]}</span></div>`;
    }
  }, 100);
}

function clearRaffle() {
  state.participants.clear();
  document.getElementById('raffle-count').textContent = "0";
  document.getElementById('raffle-winner').innerHTML = "";
}
</script>
</body>
</html>
