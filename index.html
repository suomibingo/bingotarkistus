<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo-Tarkistaja Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg: #1a1a2e; --white: #ffffff; --accent: #e94560; --success: #0f9d58; --blue: #2980b9; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        
        .step-card { background: white; color: #333; padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .hidden { display: none; }
        
        .btn { background: var(--accent); color: white; border: none; padding: 15px 25px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-blue { background: var(--blue); }

        #reader { width: 100%; background: #000; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        
        .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top: 15px; background: #444; padding: 5px; border-radius: 8px; }
        .cell { background: white; color: black; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; border-radius: 4px; position: relative; }
        .cell.matched { background: #ffdee2; }
        .cell.matched::after { content: ""; position: absolute; width: 70%; height: 70%; border: 3px solid var(--accent); border-radius: 50%; }
        .cell.star { color: #f1c40f; font-size: 22px; }
        .spacer { grid-column: span 5; height: 12px; background: #222; }

        .analysis-card { background: #0f3460; color: white; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: left; border-left: 5px solid var(--success); }
        .analysis-card h2 { margin: 0; color: var(--success); }
        .grid-label { font-size: 12px; color: #aaa; margin-top: 10px; display: block; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h1>Bingo-Analyysi</h1>

    <!-- VAIHE 0: VALINTA -->
    <div id="step0" class="step-card">
        <h3>Valitse Pelimuoto</h3>
        <button class="btn" onclick="selectMode('pieni')">Pieni (5x5)</button>
        <button class="btn btn-blue" onclick="selectMode('iso')">Iso (3 x 5x5)</button>
    </div>

    <!-- VAIHE 1: TV -->
    <div id="step1" class="step-card hidden">
        <h3>VAIHE 1: Skannaa TV</h3>
        <p>Lue QR-koodi televisiosta saadaksesi huudetut numerot.</p>
        <button class="btn" onclick="startScan('tv')">Avaa Kamera</button>
        <div id="tv-status" style="margin-top:10px; color: var(--blue);"></div>
    </div>

    <!-- VAIHE 2: LAPPU -->
    <div id="step2" class="step-card hidden">
        <h3>VAIHE 2: Skannaa Paperilappu</h3>
        <p>Lue QR-koodi paperisesta bingolapusta.</p>
        <button class="btn" onclick="startScan('card')">Avaa Kamera</button>
    </div>

    <!-- SKANNERI-ALUE -->
    <div id="reader-container" class="hidden">
        <div id="reader"></div>
        <button class="btn btn-blue" onclick="cancelScan()">Peruuta</button>
    </div>

    <!-- TULOSALUE -->
    <div id="result-area" class="hidden">
        <div class="analysis-card">
            <h2 id="total-bingos">0 Riviä</h2>
            <div id="breakdown-text"></div>
        </div>
        <div id="bingo-grid" class="bingo-grid"></div>
        <button class="btn btn-blue" onclick="location.reload()">Uusi tarkistus</button>
    </div>
</div>

<script>
    let html5QrCode = null;
    let calledNumbers = [];
    let gameMode = 'pieni';
    let scanTarget = '';

    window.onload = () => { showStep(0); };

    function selectMode(mode) {
        gameMode = mode;
        showStep(1);
    }

    function showStep(s) {
        document.getElementById('step0').classList.add('hidden');
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('reader-container').classList.add('hidden');
        document.getElementById('step' + s).classList.remove('hidden');
    }

    function startScan(target) {
        scanTarget = target;
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('reader-container').classList.remove('hidden');

        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            (text) => handleScanSuccess(text)
        ).catch(err => {
            alert("Kamera-apu: Salli kameran käyttö.");
            cancelScan();
        });
    }

    function cancelScan() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                showStep(scanTarget === 'tv' ? 1 : 2);
            });
        }
    }

    function handleScanSuccess(text) {
        // Pysäytetään kamera välittömästi
        html5QrCode.stop().then(() => {
            document.getElementById('reader-container').classList.add('hidden');
            
            if (scanTarget === 'tv') {
                calledNumbers = (text.match(/\d+/g) || []).map(Number);
                document.getElementById('tv-status').innerText = "Vastaanotettu " + calledNumbers.length + " numeroa.";
                setTimeout(() => showStep(2), 500); // Pieni viive varmuuden vuoksi
            } else {
                parseCard(text);
            }
        });
    }

    function parseCard(text) {
        const letters = ['B', 'I', 'N', 'G', 'O'];
        const columns = {};
        letters.forEach(l => {
            const regex = new RegExp(l + ":\\s*([\\d,T\\s]+)", "i");
            const match = text.match(regex);
            columns[l] = match ? match[1].split(/[\s,]+/).filter(x => x !== "") : [];
        });
        renderResults(columns);
    }

    function renderResults(cols) {
        const gridDiv = document.getElementById('bingo-grid');
        gridDiv.innerHTML = "";
        document.getElementById('result-area').classList.remove('hidden');
        
        const rowsCount = gameMode === 'pieni' ? 5 : 15;
        let board = [];

        for (let r = 0; r < rowsCount; r++) {
            if (gameMode === 'iso' && r > 0 && r % 5 === 0) {
                const spacer = document.createElement('div');
                spacer.className = 'spacer';
                gridDiv.appendChild(spacer);
            }

            let rowData = [];
            ['B','I','N','G','O'].forEach(l => {
                let val = cols[l][r] || "";
                let isStar = (val.toUpperCase() === 'T');
                let num = isStar ? 'T' : parseInt(val);
                let isMatched = isStar || calledNumbers.includes(num);

                rowData.push(isMatched);

                const cell = document.createElement('div');
                cell.className = 'cell' + (isMatched ? ' matched' : '') + (isStar ? ' star' : '');
                cell.innerHTML = isStar ? "★" : (num || "");
                gridDiv.appendChild(cell);
            });
            board.push(rowData);
        }

        analyzeWin(board);
    }

    function analyzeWin(board) {
        let fullRows = [];
        board.forEach((row, index) => {
            if (row.every(cell => cell === true)) {
                fullRows.push(index);
            }
        });

        const total = fullRows.length;
        document.getElementById('total-bingos').innerText = total + (total === 1 ? " Rivi" : " Riviä") + " Valmiina!";

        let breakdown = "";
        if (gameMode === 'iso') {
            let g1 = fullRows.filter(r => r < 5).length;
            let g2 = fullRows.filter(r => r >= 5 && r < 10).length;
            let g3 = fullRows.filter(r => r >= 10).length;
            
            breakdown = `
                <span class="grid-label">Taulukko 1 (Ylä):</span> ${g1} riviä<br>
                <span class="grid-label">Taulukko 2 (Keski):</span> ${g2} riviä<br>
                <span class="grid-label">Taulukko 3 (Ala):</span> ${g3} riviä
            `;
        } else {
            breakdown = "Kaikki rivit tarkistettu perinteisestä 5x5 ruudukosta.";
        }
        
        document.getElementById('breakdown-text').innerHTML = breakdown;
    }
</script>

</body>
</html>
