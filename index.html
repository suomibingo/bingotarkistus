<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo-Tarkistaja Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg: #1a1a2e; --white: #ffffff; --accent: #e94560; --success: #0f9d58; --blue: #2980b9; --gold: #f1c40f; --grey: #95a5a6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        
        .card { background: white; color: #333; padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .hidden { display: none; }
        
        .btn { border: none; padding: 15px 25px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .btn-main { background: var(--accent); color: white; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-gold { background: var(--gold); color: #1a1a2e; }
        .btn-back { background: var(--grey); color: white; margin-top: 20px; font-size: 15px; }

        #reader { width: 100%; background: #000; border-radius: 10px; margin-top: 15px; overflow: hidden; min-height: 250px; }
        
        /* RIVI-VALITSIN */
        .line-selector { display: flex; justify-content: space-around; margin-top: 15px; }
        .line-btn { width: 50px; height: 50px; border-radius: 50%; border: 3px solid var(--blue); background: white; font-weight: bold; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .line-btn.active { background: var(--blue); color: white; }

        /* BINGO RUUDUKKO */
        .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top: 15px; background: #444; padding: 5px; border-radius: 8px; }
        .cell { background: white; color: black; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; border-radius: 4px; position: relative; }
        .cell.matched { background: #ffdee2; }
        .cell.matched::after { content: ""; position: absolute; width: 70%; height: 70%; border: 3px solid var(--accent); border-radius: 50%; }
        .cell.star { color: var(--gold); font-size: 22px; }
        .spacer { grid-column: span 5; height: 12px; background: #222; }

        /* TULOS-IKKUNAT */
        .status-banner { padding: 15px; border-radius: 10px; font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        .status-genuine { background: var(--success); color: white; }
        .status-invalid { background: var(--accent); color: white; }
        .breakdown { background: #f8f9fa; border: 1px solid #ddd; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Bingo-Sovellus</h1>

    <!-- ETUSIVU -->
    <div id="step-mode" class="card">
        <h3>1. Valitse Pelimuoto</h3>
        <button class="btn btn-main" onclick="selectMode('pieni')">Pieni Bingo (5x5)</button>
        <button class="btn btn-blue" onclick="selectMode('iso')">Iso Bingo (3x5x5)</button>
        <button class="btn btn-gold" onclick="selectMode('raffle')">🎁 Lisäarvonta</button>
    </div>

    <!-- RIVI-VALINTA -->
    <div id="step-lines" class="card hidden">
        <h3>2. Kuinka monta riviä haetaan?</h3>
        <div class="line-selector">
            <div class="line-btn" onclick="setLines(1)">1</div>
            <div class="line-btn" onclick="setLines(2)">2</div>
            <div class="line-btn" onclick="setLines(3)">3</div>
            <div class="line-btn" onclick="setLines(4)">4</div>
            <div class="line-btn" onclick="setLines(5)">5</div>
        </div>
        <button class="btn btn-back" onclick="location.reload()">Peruuta</button>
    </div>

    <!-- TV SKANNAUS -->
    <div id="step-tv" class="card hidden">
        <h3>3. Skannaa TV</h3>
        <p>Haetaan <b id="target-display">X</b> riviä samasta ruudukosta.</p>
        <button class="btn btn-main" onclick="startScanner('tv')">Avaa Kamera</button>
        <button class="btn btn-back" onclick="goHome()">← Alkuun</button>
    </div>

    <!-- LAPPU SKANNAUS -->
    <div id="step-card" class="card hidden">
        <h3>4. Skannaa Paperilappu</h3>
        <button class="btn btn-main" onclick="startScanner('card')">Avaa Kamera</button>
        <button class="btn btn-back" onclick="goHome()">← Alkuun</button>
    </div>

    <!-- LISÄARVONTA -->
    <div id="step-raffle" class="card hidden">
        <h3>🎁 Lisäarvonta</h3>
        <button class="btn btn-gold" onclick="startScanner('raffle')">Skannaa Osallistuja</button>
        <div id="raffle-container" class="hidden">
            <div id="participant-list" style="text-align:left; font-size:14px; background:#eee; padding:10px; margin-top:10px;"></div>
            <div id="winner-box" style="font-size:24px; font-weight:bold; color:var(--success); margin:15px 0; display:none;"></div>
            <button class="btn btn-blue" onclick="runRaffle()">ARVO VOITTAJA</button>
        </div>
        <button class="btn btn-back" onclick="goHome()">← Alkuun</button>
    </div>

    <!-- SKANNERI-UI -->
    <div id="scanner-ui" class="hidden" style="width:100%">
        <div id="reader"></div>
        <button class="btn btn-blue" onclick="stopScanner()">Peruuta</button>
    </div>

    <!-- TULOKSET -->
    <div id="step-results" class="hidden" style="width: 100%;">
        <div class="card">
            <div id="genuine-status" class="status-banner">TARKISTETAAN...</div>
            <div class="breakdown" id="res-breakdown"></div>
            <div id="bingo-grid" class="bingo-grid"></div>
            <button class="btn btn-blue" onclick="retryCard()">Tarkista seuraava lappu</button>
            <button class="btn btn-back" onclick="goHome()">← Alkuun</button>
        </div>
    </div>
</div>

<script>
    let scanner = null;
    let calledNumbers = [];
    let gameMode = '';
    let targetLines = 1;
    let currentTarget = '';
    let participants = [];

    function selectMode(m) {
        gameMode = m;
        document.getElementById('step-mode').classList.add('hidden');
        if (m === 'raffle') {
            document.getElementById('step-raffle').classList.remove('hidden');
        } else {
            document.getElementById('step-lines').classList.remove('hidden');
        }
    }

    function setLines(n) {
        targetLines = n;
        document.getElementById('target-display').innerText = n;
        document.getElementById('step-lines').classList.add('hidden');
        document.getElementById('step-tv').classList.remove('hidden');
    }

    function goHome() { location.reload(); }
    function retryCard() {
        document.getElementById('step-results').classList.add('hidden');
        document.getElementById('step-card').classList.remove('hidden');
    }

    async function startScanner(target) {
        currentTarget = target;
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        document.getElementById('scanner-ui').classList.remove('hidden');

        if (!scanner) scanner = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        
        scanner.start({ facingMode: "environment" }, config, onScanSuccess)
        .catch(() => { alert("Kamera-ongelma."); stopScanner(); });
    }

    function onScanSuccess(text) {
        if (currentTarget === 'raffle') {
            const match = text.match(/\d{6}/);
            if (match) {
                if (!participants.includes(match[0])) participants.push(match[0]);
                updateRaffleUI();
            }
            stopScanner();
        } else if (currentTarget === 'tv') {
            calledNumbers = (text.match(/\d+/g) || []).map(Number);
            stopScanner();
            if (calledNumbers.length > 0) document.getElementById('step-card').classList.remove('hidden');
        } else if (currentTarget === 'card') {
            stopScanner();
            parseBingoCard(text);
        }
    }

    function stopScanner() {
        if (scanner) scanner.stop().catch(() => {});
        document.getElementById('scanner-ui').classList.add('hidden');
        if (gameMode === 'raffle') document.getElementById('step-raffle').classList.remove('hidden');
        else if (calledNumbers.length === 0) document.getElementById('step-tv').classList.remove('hidden');
        else document.getElementById('step-card').classList.remove('hidden');
    }

    function parseBingoCard(text) {
        const letters = ['B', 'I', 'N', 'G', 'O'];
        const columns = {};
        letters.forEach(l => {
            const regex = new RegExp(l + ":\\s*([\\d,T\\s]+)", "i");
            const match = text.match(regex);
            columns[l] = match ? match[1].split(/[\s,]+/).filter(x => x.trim() !== "") : [];
        });
        showBingoResults(columns);
    }

    function showBingoResults(cols) {
        document.getElementById('step-card').classList.add('hidden');
        document.getElementById('step-results').classList.remove('hidden');
        const gridDiv = document.getElementById('bingo-grid');
        gridDiv.innerHTML = "";
        
        const rowsCount = gameMode === 'pieni' ? 5 : 15;
        let board = [];

        // Rakennetaan ruudukko
        for (let r = 0; r < rowsCount; r++) {
            if (gameMode === 'iso' && r > 0 && r % 5 === 0) {
                const spacer = document.createElement('div'); spacer.className = 'spacer';
                gridDiv.appendChild(spacer);
            }
            let rowMatched = [];
            ['B','I','N','G','O'].forEach(l => {
                let val = cols[l][r] || "";
                let isStar = (val.toUpperCase() === 'T');
                let num = isStar ? 'T' : parseInt(val);
                let isMatched = isStar || calledNumbers.includes(num);
                rowMatched.push(isMatched);
                const cell = document.createElement('div');
                cell.className = 'cell' + (isMatched ? ' matched' : '') + (isStar ? ' star' : '');
                cell.innerHTML = isStar ? "★" : (num || "");
                gridDiv.appendChild(cell);
            });
            board.push(rowMatched);
        }

        // --- TARKISTUS-LOGIIKKA ---
        let isGenuine = false;
        let breakdownHTML = "";

        if (gameMode === 'iso') {
            const s1 = board.slice(0,5).filter(row => row.every(c => c)).length;
            const s2 = board.slice(5,10).filter(row => row.every(c => c)).length;
            const s3 = board.slice(10,15).filter(row => row.every(c => c)).length;

            if (s1 >= targetLines || s2 >= targetLines || s3 >= targetLines) isGenuine = true;
            breakdownHTML = `Haettu määrä: ${targetLines} riviä<br>Ylä: ${s1} | Keski: ${s2} | Ala: ${s3}`;
        } else {
            const count = board.filter(row => row.every(c => c)).length;
            if (count >= targetLines) isGenuine = true;
            breakdownHTML = `Haettu määrä: ${targetLines} riviä<br>Löytynyt: ${count} riviä`;
        }

        const statusBanner = document.getElementById('genuine-status');
        if (isGenuine) {
            statusBanner.innerText = "✅ BINGO ON AITO!";
            statusBanner.className = "status-banner status-genuine";
        } else {
            statusBanner.innerText = "❌ EI BINGOA VIELÄ";
            statusBanner.className = "status-banner status-invalid";
        }
        document.getElementById('res-breakdown').innerHTML = breakdownHTML;
    }

    function updateRaffleUI() {
        document.getElementById('raffle-container').classList.remove('hidden');
        document.getElementById('participant-list').innerText = participants.join(", ");
        document.getElementById('winner-box').style.display = 'none';
    }

    function runRaffle() {
        if (participants.length === 0) return;
        const box = document.getElementById('winner-box');
        box.style.display = 'block';
        box.innerText = "Arvotaan...";
        setTimeout(() => {
            box.innerText = "VOITTAJA: " + participants[Math.floor(Math.random() * participants.length)];
        }, 1500);
    }
</script>
</body>
</html>
